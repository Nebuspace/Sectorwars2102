user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log notice;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;

    # CORS origin allowlist: reflect Origin only for trusted frontends.
    # $cors_allow_origin resolves to the request's Origin for known hosts,
    # or "" for everything else (browsers see missing/empty ACAO and block JS).
    # Update when a new public-facing origin is added.
    # Flag for Max: these domains come from ServerSetup/docs/services/sectorwars-hosting.md;
    # correct here if the apex or subdomain pattern ever changes.
    map $http_origin $cors_allow_origin {
        default                              "";
        "https://sw2102.shouden.us"          $http_origin;
        "https://sw2102-admin.shouden.us"    $http_origin;
        "https://sw2102-stage.shouden.us"    $http_origin;
        "https://sw2102-dev.shouden.us"      $http_origin;
    }

    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    # Performance tuning
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Rate limiting
    # Rate-limit zones — production values; dev/stage uses higher rates and bursts.
    # Vite dev mode fans out 100+ module requests on initial app load; with the
    # original burst=20 limit, the late requests get 503 (then nginx's HTML error
    # page is returned, causing module-script MIME mismatches in the browser).
    limit_req_zone $binary_remote_addr zone=api:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=general:10m rate=500r/s;

    # Upstream definitions
    upstream gameserver_backend {
        least_conn;
        server gameserver:8080 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream admin_ui_backend {
        least_conn;
        server admin-ui:3000 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    upstream player_client_backend {
        least_conn;
        server player-client:3000 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    # upstream region_manager_backend {
    #     least_conn;
    #     server region-manager:8081 max_fails=3 fail_timeout=30s;
    #     keepalive 8;
    # }

    # Regional backends (dynamically populated)
    include /etc/nginx/conf.d/regions/*.conf;

    # SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-SHA256:ECDHE-RSA-AES256-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Main server block
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Redirect HTTP to HTTPS in production (except health check).
        # $host reflects the client Host header rather than $server_name (which
        # is "_" on a catch-all block and would produce "https://_/...").
        # Risk note: $host without a named server_name allowlist allows Host
        # injection in theory; in practice Cloudflare normalises Host before
        # traffic reaches nginx here, keeping the risk low. The proper hardening
        # is to add explicit server_name directives for each real domain — worth
        # doing when the nginx config gains per-domain server blocks.
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS server
    server {
        listen 443 ssl http2 default_server;
        listen [::]:443 ssl http2 default_server;
        server_name _;

        # SSL certificates (should be mounted from host)
        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;

        # Root location - Player Client
        location / {
            limit_req zone=general burst=200 nodelay;
            
            proxy_pass http://player_client_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 86400;
        }

        # Admin UI. proxy_pass intentionally has NO trailing slash so the
        # /admin/ prefix is forwarded to Vite intact. Vite is configured
        # with `base: '/admin/'` (via VITE_BASE env), which means it
        # emits asset URLs prefixed with /admin/ (e.g. /admin/src/main.tsx)
        # and only serves index.html when the request path starts with
        # the base. Without the prefix forwarded, Vite sees `/` and 302s
        # back to `/admin/` in an infinite loop.
        location /admin/ {
            limit_req zone=api burst=200 nodelay;

            proxy_pass http://admin_ui_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # Game Server WebSocket — must be declared BEFORE /api/v1/ because
        # nginx picks the longest-prefix match. The /api/v1/ block does not
        # forward Upgrade/Connection headers (correctly, because most API
        # calls are not WebSockets), so a WebSocket request landing there
        # gets downgraded to plain HTTP and the gameserver returns 404. The
        # gameserver mounts its WS routes at /api/v1/ws/{connect,admin}, so
        # this block proxies that path with the upgrade headers intact.
        location /api/v1/ws/ {
            proxy_pass http://gameserver_backend/api/v1/ws/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
        }

        # Game Server API
        location /api/v1/ {
            limit_req zone=api burst=200 nodelay;

            proxy_pass http://gameserver_backend/api/v1/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            # CORS — trusted origins only (see map $cors_allow_origin in http block).
            # OPTIONS preflight: full CORS header set + 204 via the if block
            # (add_header inside the if block shadows the outer directives for
            # OPTIONS requests, so all four headers must be repeated there).
            # Non-OPTIONS: outer add_header lines fire; $cors_allow_origin is ""
            # for untrusted origins so browsers see a missing/empty ACAO and
            # block JS access without the server needing to return an error.
            # Vary: Origin prevents a CDN from serving one origin's ACAO to another.
            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin $cors_allow_origin always;
                add_header Access-Control-Allow-Credentials true always;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PATCH" always;
                add_header Access-Control-Allow-Headers "Accept, Authorization, Cache-Control, Content-Type, DNT, If-Modified-Since, Keep-Alive, Origin, User-Agent, X-Requested-With" always;
                add_header Vary Origin always;
                return 204;
            }
            add_header Access-Control-Allow-Origin $cors_allow_origin always;
            add_header Access-Control-Allow-Credentials true always;
            add_header Vary Origin always;
        }

        # Regional API routing — DISABLED 2026-06-20.
        # The regional governance / territory endpoints (/api/v1/regions/{id}/...,
        # /api/v1/regions/my-region/...) are currently served by the CENTRAL
        # gameserver (services/gameserver/src/api/routes/regional_governance.py,
        # APIRouter(prefix="/regions") mounted at /api/v1) against the central
        # `regions` table. This dynamic per-region proxy regex matched those paths
        # first and forwarded them to not-yet-existent `region-<name>-server`
        # containers, returning 502 on every governance call. With it disabled,
        # /api/v1/regions/* falls through to the `location /api/v1/` block above and
        # reaches gameserver_backend. Restore (and re-scope to genuinely per-region
        # paths) once real per-region gameservers are provisioned by region-manager.
        #
        # NOTE: Regex locations take precedence over normal prefix locations in
        # nginx. When re-enabling this block, keep rate-limiting consistent with
        # /api/v1/ to prevent a lower-rate zone from being bypassed via the
        # regional path:  limit_req zone=api burst=200 nodelay;
        #
        # location ~ ^/api/v1/regions/([a-z0-9-]+)/(.*)$ {
        #     # Capture group restricted to [a-z0-9-]+ to prevent SSRF via
        #     # crafted region names (e.g. "../../etc/passwd") injected into
        #     # the upstream hostname.
        #     limit_req zone=api burst=200 nodelay;
        #     set $region_name $1;
        #     set $region_path $2;
        #     proxy_pass http://region-$region_name-server:8080/api/v1/$region_path$is_args$args;
        #     proxy_http_version 1.1;
        #     proxy_set_header Host $host;
        #     proxy_set_header X-Real-IP $remote_addr;
        #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        #     proxy_set_header X-Forwarded-Proto $scheme;
        #     proxy_set_header X-Region-Name $region_name;
        #     proxy_connect_timeout 5s;
        #     proxy_send_timeout 60s;
        #     proxy_read_timeout 60s;
        #     add_header Access-Control-Allow-Origin $cors_allow_origin always;
        #     add_header Access-Control-Allow-Credentials true always;
        #     add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PATCH" always;
        #     add_header Access-Control-Allow-Headers "Accept, Authorization, Cache-Control, Content-Type, DNT, If-Modified-Since, Keep-Alive, Origin, User-Agent, X-Requested-With" always;
        #     add_header Vary Origin always;
        # }

        # Region Manager API (Commented out for development)
        # location /api/v1/region-manager/ {
        #     limit_req zone=api burst=10 nodelay;
        #     
        #     # Restrict access to admin users only
        #     access_by_lua_block {
        #         -- Add authentication check here if needed
        #     }
        #     
        #     proxy_pass http://region_manager_backend/;
        #     proxy_http_version 1.1;
        #     proxy_set_header Host $host;
        #     proxy_set_header X-Real-IP $remote_addr;
        #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        #     proxy_set_header X-Forwarded-Proto $scheme;
        # }

        # WebSocket support for real-time features
        location /ws/ {
            proxy_pass http://gameserver_backend/ws/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
        }

        # Regional WebSocket routing
        location ~ ^/ws/regions/([^/]+)/(.*)$ {
            set $region_name $1;
            set $region_path $2;
            
            proxy_pass http://region-$region_name-server:8080/ws/$region_path;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Region-Name $region_name;
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
        }

        # Health checks
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Monitoring endpoints
        location /metrics {
            # Restrict to monitoring systems
            allow 172.20.0.0/16;  # Nexus network
            allow 172.21.0.0/16;  # Regional network
            deny all;
            
            proxy_pass http://gameserver_backend/api/v1/status/metrics;
            proxy_set_header Host $host;
        }

        # Static assets — caching headers only, no proxy_pass override.
        # Without a proxy_pass the previous version of this block dropped
        # requests into nginx's default root (no files), returning the
        # 404 HTML fallback — fatal for Vite dev mode where every .js
        # request must reach the upstream dev server. Same fix for `.`-
        # paths below: Vite stores prebundled deps under /node_modules/.vite/
        # which the `location ~ /\.` deny rule was blocking.
        # In production these blocks should be re-enabled with proxy_pass
        # to a built-assets origin or a CDN.

        location ~ ~$ {
            deny all;
            access_log off;
            log_not_found off;
        }

        # Custom error pages
        error_page 404 /404.html;
        error_page 500 502 503 504 /50x.html;
        
        location = /404.html {
            root /usr/share/nginx/html;
            internal;
        }
        
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }
    }

    # Regional server template (generated dynamically)
    # This would be populated by the region manager
    # server {
    #     listen 443 ssl http2;
    #     server_name region-NAME.sectorwars.com;
    #     
    #     location / {
    #         proxy_pass http://region-NAME-server:8080;
    #         # ... other config
    #     }
    # }
}

