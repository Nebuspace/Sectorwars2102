# Dependabot configuration.
#
# Until this file existed, Dependabot's `security-updates` half was opening
# alerts but the `version-updates` half (which actually files PRs) was idle.
# The 65 open alerts triaged at DOCS/PLANS/dependabot-triage-2026-05-31.md
# accumulated because nothing was auto-PRing fixes.
#
# This config enables version-updates across all 4 manifest roots
# (3× npm + 1× pip), groups security/patch bumps into one PR per ecosystem
# per run, and leaves majors as individual PRs so they get human review.

version: 2
updates:
  # ---------------------------------------------------------------------
  # npm — three lockfiles (root, player-client, admin-ui)
  # ---------------------------------------------------------------------
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 4
    labels:
      - "dependencies"
      - "npm"
    groups:
      safe-bumps:
        applies-to: "version-updates"
        patterns: ["*"]
        update-types: ["patch", "minor"]
      majors:
        applies-to: "version-updates"
        patterns: ["*"]
        update-types: ["major"]

  - package-ecosystem: "npm"
    directory: "/services/player-client"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 4
    labels:
      - "dependencies"
      - "npm"
      - "player-client"
    groups:
      safe-bumps:
        applies-to: "version-updates"
        patterns: ["*"]
        update-types: ["patch", "minor"]
      majors:
        applies-to: "version-updates"
        patterns: ["*"]
        update-types: ["major"]

  - package-ecosystem: "npm"
    directory: "/services/admin-ui"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 4
    labels:
      - "dependencies"
      - "npm"
      - "admin-ui"
    groups:
      safe-bumps:
        applies-to: "version-updates"
        patterns: ["*"]
        update-types: ["patch", "minor"]
      majors:
        applies-to: "version-updates"
        patterns: ["*"]
        update-types: ["major"]

  # ---------------------------------------------------------------------
  # pip — gameserver (Poetry-managed)
  # ---------------------------------------------------------------------
  - package-ecosystem: "pip"
    directory: "/services/gameserver"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 4
    labels:
      - "dependencies"
      - "pip"
      - "gameserver"
    groups:
      safe-bumps:
        applies-to: "version-updates"
        patterns: ["*"]
        update-types: ["patch", "minor"]
      majors:
        applies-to: "version-updates"
        patterns: ["*"]
        update-types: ["major"]
