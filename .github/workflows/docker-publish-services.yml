name: Build & publish service images

# Fans out a per-service Docker build/push across the 5 game services on:
#   * push to master         → :master + :sha-<short>
#   * push of semver tag     → :1.2.3, :1.2, :1, :latest
#   * workflow_dispatch      → :manual
#
# Per-service path filters (dorny/paths-filter) gate each build so a CSS-only
# admin-ui change doesn't rebuild gameserver. Tag pushes and manual dispatches
# always rebuild everything (release behavior).

on:
  push:
    branches: [master]
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      services:
        description: "Comma-separated services to build, or 'all'"
        required: false
        default: "all"

permissions:
  contents: read

env:
  # Single source of truth for the bang image gameserver depends on at build time.
  # Update here AND in docker-compose.yml (BANG_VERSION env / build arg) together.
  BANG_VERSION: "1.3.3"

jobs:
  detect-changes:
    name: Detect changed services
    runs-on: ubuntu-latest
    outputs:
      gameserver: ${{ steps.filter.outputs.gameserver }}
      player-client: ${{ steps.filter.outputs.player-client }}
      admin-ui: ${{ steps.filter.outputs.admin-ui }}
      nginx-gateway: ${{ steps.filter.outputs.nginx-gateway }}
      region-manager: ${{ steps.filter.outputs.region-manager }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            gameserver:
              - 'services/gameserver/**'
              - '.github/workflows/docker-publish-services.yml'
            player-client:
              - 'services/player-client/**'
              - '.github/workflows/docker-publish-services.yml'
            admin-ui:
              - 'services/admin-ui/**'
              - '.github/workflows/docker-publish-services.yml'
            nginx-gateway:
              - 'services/nginx-gateway/**'
              - '.github/workflows/docker-publish-services.yml'
            region-manager:
              - 'services/region-manager/**'
              - '.github/workflows/docker-publish-services.yml'

  build:
    name: ${{ matrix.service.name }}
    needs: detect-changes
    runs-on: ubuntu-latest
    strategy:
      # One bad service shouldn't kill the rest of the release.
      fail-fast: false
      matrix:
        service:
          - name: gameserver
            context: services/gameserver
            dockerfile: services/gameserver/Dockerfile
            image: drxelanull/sw2102-gameserver
            changed-output: gameserver
            build-args: |
              BANG_VERSION=1.3.3
          - name: player-client
            context: services/player-client
            dockerfile: services/player-client/Dockerfile
            image: drxelanull/sw2102-player-client
            changed-output: player-client
            build-args: ""
          - name: admin-ui
            context: services/admin-ui
            dockerfile: services/admin-ui/Dockerfile
            image: drxelanull/sw2102-admin-ui
            changed-output: admin-ui
            build-args: ""
          - name: nginx-gateway
            context: services/nginx-gateway
            dockerfile: services/nginx-gateway/Dockerfile
            image: drxelanull/sw2102-nginx-gateway
            changed-output: nginx-gateway
            build-args: ""
          - name: region-manager
            context: services/region-manager
            dockerfile: services/region-manager/Dockerfile
            image: drxelanull/sw2102-region-manager
            changed-output: region-manager
            build-args: ""
    steps:
      - name: Decide whether to build
        id: gate
        env:
          GAMESERVER: ${{ needs.detect-changes.outputs.gameserver }}
          PLAYER_CLIENT: ${{ needs.detect-changes.outputs.player-client }}
          ADMIN_UI: ${{ needs.detect-changes.outputs.admin-ui }}
          NGINX_GATEWAY: ${{ needs.detect-changes.outputs.nginx-gateway }}
          REGION_MANAGER: ${{ needs.detect-changes.outputs.region-manager }}
          SERVICE_NAME: ${{ matrix.service.name }}
          REF: ${{ github.ref }}
          EVENT: ${{ github.event_name }}
          MANUAL_SERVICES: ${{ github.event.inputs.services }}
        run: |
          set -eu
          # Always-build cases: any tag push, or manual dispatch with all/this service
          if [[ "${EVENT}" == "workflow_dispatch" ]]; then
            if [[ "${MANUAL_SERVICES}" == "all" || ",${MANUAL_SERVICES}," == *",${SERVICE_NAME},"* ]]; then
              echo "build=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "build=false" >> "$GITHUB_OUTPUT"
            echo "Manual dispatch did not include ${SERVICE_NAME}; skipping."
            exit 0
          fi

          if [[ "${REF}" == refs/tags/v* ]]; then
            echo "build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # master push: only if the service's path filter matched.
          case "${SERVICE_NAME}" in
            gameserver)      CHANGED="${GAMESERVER}" ;;
            player-client)   CHANGED="${PLAYER_CLIENT}" ;;
            admin-ui)        CHANGED="${ADMIN_UI}" ;;
            nginx-gateway)   CHANGED="${NGINX_GATEWAY}" ;;
            region-manager)  CHANGED="${REGION_MANAGER}" ;;
            *)               CHANGED="false" ;;
          esac

          if [[ "${CHANGED}" == "true" ]]; then
            echo "build=true" >> "$GITHUB_OUTPUT"
          else
            echo "build=false" >> "$GITHUB_OUTPUT"
            echo "No changes under services/${SERVICE_NAME}/; skipping build."
          fi

      - name: Checkout
        if: steps.gate.outputs.build == 'true'
        uses: actions/checkout@v4

      - name: Set up QEMU (arm64 emulation)
        if: steps.gate.outputs.build == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        if: steps.gate.outputs.build == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        if: steps.gate.outputs.build == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Derive tags
        if: steps.gate.outputs.build == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.service.image }}
          # Master pushes get :master + :sha-<short>; semver tags get the full
          # cascade incl. :latest; manual dispatches get :manual.
          tags: |
            type=raw,value=master,enable=${{ github.ref == 'refs/heads/master' }}
            type=sha,format=short,prefix=sha-,enable=${{ github.ref == 'refs/heads/master' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=manual,enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push
        if: steps.gate.outputs.build == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          # Every service Dockerfile exposes a `production` stage. Multi-stage
          # means dev tooling (Vite dev server, --reload, dev deps) doesn't end
          # up in the published image.
          target: production
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.service.build-args }}
          # Per-service GHA cache scope so admin-ui's cache doesn't churn gameserver's.
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}

      - name: Summary
        if: steps.gate.outputs.build == 'true'
        env:
          # Both values are internally-derived (matrix-static / metadata-action
          # output), but follow the env-var pattern anyway so future edits can't
          # accidentally introduce a command-injection vector.
          SERVICE_NAME: ${{ matrix.service.name }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          {
            echo "### ${SERVICE_NAME} → published"
            echo '```'
            echo "${TAGS}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
