name: bang-version-check

# Gate any PR that bumps the BANG_VERSION pin in docker-compose.yml on
# the image actually being pullable from DockerHub. Catches version-bump
# typos and unpublished tags before they hit production translator runs.

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - master
      - dev

# Smoke test only reads the repo + pulls a public image; no write capability needed.
permissions:
  contents: read

jobs:
  bang-image-smoke-test:
    name: Pull and smoke-test pinned bang image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Extract BANG_VERSION from docker-compose.yml
        id: bang_version
        run: |
          # Match ${BANG_VERSION:-N.N.N} and pull the version out of the
          # default-value half. The earlier two-step sed approach mishandled
          # the backslash escape on $ in BRE and left ':-1.3.0' on the front
          # of the version string (causing 'invalid reference format' on the
          # docker pull). One grep + one sed does the job cleanly.
          VERSION=$(grep -oE '\$\{BANG_VERSION:-[0-9]+\.[0-9]+\.[0-9]+\}' docker-compose.yml \
                    | head -1 \
                    | sed -E 's/.*:-([^}]+)\}/\1/')
          if [ -z "$VERSION" ]; then
            echo "ERROR: could not extract BANG_VERSION from docker-compose.yml"
            exit 1
          fi
          echo "Extracted BANG_VERSION=$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Pull pinned bang image
        env:
          BANG_TAG: ${{ steps.bang_version.outputs.version }}
        run: |
          docker pull "docker.io/drxelanull/sw2102-bang:${BANG_TAG}"

      - name: Smoke-test bang generation
        # bang v1.3.1+ ENTRYPOINT defaults to dist/cli.js so the image is
        # callable bare.
        env:
          BANG_TAG: ${{ steps.bang_version.outputs.version }}
        run: |
          docker run --rm \
            "docker.io/drxelanull/sw2102-bang:${BANG_TAG}" \
            --seed 42 --sectors 100 --json-out > /tmp/bang.json

      - name: Assert bang reports the pinned version
        env:
          BANG_TAG: ${{ steps.bang_version.outputs.version }}
        run: |
          REPORTED=$(jq -r '.version' /tmp/bang.json)
          echo "Reported: $REPORTED"
          echo "Expected: $BANG_TAG"
          if [ "$REPORTED" != "$BANG_TAG" ]; then
            echo "ERROR: bang image reported version '$REPORTED' but compose pins '$BANG_TAG'"
            exit 1
          fi
